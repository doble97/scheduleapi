version: '3.8'

services:
  mariadb:
    # Usa la imagen oficial
    image: mariadb:latest
    container_name: mariadb_server
    
    # Mapea el puerto del host (3306) al puerto del contenedor (3306)
    ports:
      - "3306:3306"
      
    # Variables de entorno requeridas para configurar el usuario y la contraseña de root
    environment:
      # **IMPORTANTE**: ¡Cambia esta contraseña por una segura en producción!
      MYSQL_ROOT_PASSWORD: "secure_password_123"
      # Opcional: Para crear una BD inicial
      MYSQL_DATABASE: "schedule_app"
      MYSQL_USER: "schedule"
      MYSQL_PASSWORD: "schedule123"

    # Volumen para persistir los datos de la base de datos
    volumes:
      - ./migrations/db.sql:/docker-entrypoint-initdb.d/db.sql:Z
      # Se recomienda usar un volumen nombrado para persistencia de datos
      # - db_data:/var/lib/mysql
      
    # Reinicia el contenedor si se detiene, a menos que se detenga manualmente.
    restart: unless-stopped

# Definición de volúmenes nombrados
# volumes:
#   db_data:
#     driver: local
